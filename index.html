<!doctype html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DSum</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin:0;
      min-width: 320px;
      background:#15191f;
      color:#edf2f7;
      font-family:Arial, Helvetica, sans-serif;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      display: grid;
      gap: 12px;
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 14px;
    }

    .settings-panel {
      border: 1px solid #3d4857;
      border-radius: 8px;
      background: #1b222b;
    }

    .settings-panel summary {
      min-height: 38px;
      padding: 10px 12px;
      cursor: pointer;
      color: #f8fafc;
      font-weight: 800;
      list-style-position: inside;
    }

    .topbar {
      display: grid;
      grid-template-columns: 120px minmax(240px, 1fr) 96px 112px 108px;
      gap: 10px;
      align-items: end;
      padding: 0 12px 12px;
    }

    .field {
      display: grid;
      gap: 4px;
    }

    label {
      color: #9da9b8;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    select,
    input,
    button {
      min-height: 36px;
      border: 1px solid #3d4857;
      border-radius: 7px;
      background: #222a34;
      color: #f8fafc;
    }

    select,
    input {
      width: 100%;
      padding: 0 10px;
    }

    button {
      padding: 0 12px;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover {
      background: #2b3541;
    }

    [hidden] {
      display: none !important;
    }

    .pika-lead-toggle {
      display: flex;
      min-height: 36px;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      justify-content: center;
    }

    .pika-lead-toggle img {
      width: 24px;
      height: 24px;
      margin: 0;
      object-fit: contain;
      image-rendering: pixelated;
      filter: grayscale(1) brightness(0.88);
    }

    .pika-lead-toggle[aria-pressed="true"] {
      border-color: #f7d43b;
      background: #5a4815;
      color: #fff6bf;
    }

    .pika-lead-toggle[aria-pressed="true"] img {
      filter: drop-shadow(0 2px 0 rgba(0, 0, 0, 0.28));
    }

    .touch-actions {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 110px 110px;
      gap: 8px;
    }

    .primary-action {
      min-height: 116px;
      border-color: #67cf67;
      background: #24513a;
      font-size: 20px;
    }

    .primary-action:hover {
      background: #2c6347;
    }

    .primary-action:disabled {
      cursor: default;
      border-color: #526173;
      background: #2a3440;
      color: #aeb9c7;
    }

    .slot-strip {
      display: grid;
      grid-template-columns: repeat(10, minmax(72px, 1fr));
      gap: 7px;
    }

    .slot-card {
      position: relative;
      display: grid;
      grid-template-rows: auto 48px auto auto;
      align-items: center;
      min-height: 126px;
      overflow: hidden;
      padding: 7px 6px;
      border-color: color-mix(in srgb, var(--slot-color), #111 45%);
      background: #202832;
      text-align: center;
    }

    .slot-card > * {
      position: relative;
      z-index: 1;
    }

    .slot-card strong {
      min-width: 0;
      color: #fff;
      font-size: 13px;
      line-height: 1.1;
      overflow: hidden;
      text-overflow: clip;
      white-space: nowrap;
    }

    .slot-card span {
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.1;
    }

    .slot-card .slot-number {
      width: 22px;
      height: 22px;
      margin: 0 auto;
      border-radius: 999px;
      background: var(--slot-color);
      color: #17202b;
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .slot-sprite {
      width: 48px;
      height: 48px;
      margin: 0 auto;
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 2px 0 rgba(0, 0, 0, 0.28));
    }

    .slot-card i {
      position: absolute;
      z-index: 0;
      right: 0;
      bottom: 0;
      left: 0;
      height: 2%;
      background: color-mix(in srgb, var(--slot-color), transparent 35%);
      pointer-events: none;
    }

    .slot-card.selected {
      outline: 3px solid #80dc24;
      outline-offset: -3px;
    }

    .slot-card.most-likely {
      outline: 3px solid #2424fc;
      outline-offset: -3px;
    }

    .slot-card.calibration-choice {
      border-color: #ff950b;
    }

    .stage {
      display: grid;
      grid-template-columns: minmax(360px, 1fr) 260px;
      gap: 12px;
      align-items: stretch;
    }

    .wheel-viewport {
      overflow: hidden;
      border: 1px solid #3d4857;
      border-radius:8px;
      background: #28303a;
      cursor: pointer;
      touch-action: manipulation;
    }

    canvas {
      width: 100%;
      height: min(70vh, 720px);
      min-height: 420px;
      display: block;
    }

    .panel {
      display: grid;
      align-content: start;
      gap: 10px;
      padding: 12px;
      border: 1px solid #3d4857;
      border-radius: 8px;
      background: #1d242d;
    }

    .readout {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px;
      border-radius: 7px;
      background: #151b23;
    }

    .readout span {
      color: #9da9b8;
      font-weight: 700;
    }

    .readout strong {
      font-size: 18px;
    }

    .exit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .keys {
      display: grid;
      gap: 5px;
      color: #aeb9c7;
      font-size: 13px;
      line-height: 1.3;
    }

    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: 1fr 1fr;
      }

      .field-route {
        grid-column: span 2;
      }

      .slot-strip {
        grid-template-columns: repeat(5, 1fr);
      }

      .stage {
        grid-template-columns: 1fr;
      }

      canvas {
        height: 64vh;
        min-height: 360px;
      }
    }

    @media (max-width: 700px) {
      body {
        background: #121821;
      }

      .shell {
        gap: 9px;
        padding: 8px;
      }

      .settings-panel {
        position: fixed;
        top: 8px;
        right: 0;
        z-index: 30;
        width: min(86vw, 360px);
        max-height: calc(100dvh - 16px);
        overflow: visible;
        transform: translateX(calc(100% - 1px));
        transition: transform 180ms ease;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.36);
      }

      .settings-panel[open] {
        transform: translateX(0);
      }

      .settings-panel summary {
        position: absolute;
        top: 76px;
        left: -44px;
        display: grid;
        width: 44px;
        min-height: 68px;
        padding: 0;
        place-items: center;
        border: 1px solid #3d4857;
        border-right: 0;
        border-radius: 8px 0 0 8px;
        background: #222a34;
        font-size: 0;
        list-style: none;
      }

      .settings-panel summary::-webkit-details-marker {
        display: none;
      }

      .settings-panel summary::before {
        content: "<";
        color: #f8fafc;
        font-size: 28px;
        line-height: 1;
      }

      .settings-panel[open] summary::before {
        content: ">";
      }

      .topbar {
        grid-template-columns: 1fr;
        max-height: calc(100dvh - 40px);
        overflow: auto;
        padding: 12px;
      }

      .field-route {
        grid-column: auto;
      }

      .touch-actions {
        position: sticky;
        top: 0;
        z-index: 10;
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "battle battle"
          "pause reset";
        padding: 6px 0;
        background: #121821;
      }

      .touch-actions button {
        min-height: 46px;
        padding: 0 8px;
      }

      .primary-action {
        grid-area: battle;
        min-height: 152px;
        font-size: 24px;
      }

      #mobile-pause {
        grid-area: pause;
      }

      #mobile-reset {
        grid-area: reset;
      }

      .slot-strip {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 5px;
        order: 3;
      }

      .slot-card {
        grid-template-rows: auto 36px auto auto;
        min-height: 102px;
        padding: 5px 4px;
      }

      .slot-card .slot-number {
        width: 20px;
        height: 20px;
        font-size: 11px;
      }

      .slot-card span {
        font-size: 11px;
      }

      .slot-sprite {
        width: 36px;
        height: 36px;
      }

      .stage {
        display: contents;
      }

      .wheel-viewport {
        height: min(48vh, 400px);
        min-height: 300px;
        order: 2;
      }

      canvas {
        height: 100%;
        min-height: 0;
      }

      .panel {
        order: 4;
        grid-template-columns: repeat(3, 1fr);
        gap: 7px;
        padding: 8px;
      }

      .readout {
        display: grid;
        justify-items: center;
        padding: 7px 4px;
        text-align: center;
      }

      .readout span {
        font-size: 11px;
      }

      .readout strong {
        font-size: 16px;
      }

      .exit-grid {
        grid-column: 1 / -1;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
      }

      .exit-grid button {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 4px;
        font-size: 12px;
      }

      .exit-key {
        display: none;
      }

      .keys {
        display: none;
      }

    }

    @media (max-width: 390px) {
      .touch-actions {
        grid-template-columns: 1fr 1fr;
      }

      .touch-actions button {
        font-size: 14px;
      }

      .primary-action {
        font-size: 22px;
      }
    }
  </style>
  <script type="module" src="/src/main.ts"></script>
</head>
<body>
  <div id="app"></div>
</body>
</html>
