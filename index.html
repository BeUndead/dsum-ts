<!doctype html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>DSum</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin:0;
      min-width: 320px;
      background:#15191f;
      color:#edf2f7;
      font-family:Arial, Helvetica, sans-serif;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      display: grid;
      gap: 12px;
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 14px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 120px minmax(240px, 1fr) 96px 112px auto auto;
      gap: 10px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 4px;
    }

    label {
      color: #9da9b8;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    select,
    input,
    button {
      min-height: 36px;
      border: 1px solid #3d4857;
      border-radius: 7px;
      background: #222a34;
      color: #f8fafc;
    }

    select,
    input {
      width: 100%;
      padding: 0 10px;
    }

    button {
      padding: 0 12px;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover {
      background: #2b3541;
    }

    .slot-strip {
      display: grid;
      grid-template-columns: repeat(10, minmax(72px, 1fr));
      gap: 7px;
    }

    .slot-card {
      position: relative;
      display: grid;
      grid-template-rows: auto 48px auto auto;
      align-items: center;
      min-height: 126px;
      overflow: hidden;
      padding: 7px 6px;
      border-color: color-mix(in srgb, var(--slot-color), #111 45%);
      background: #202832;
      text-align: center;
    }

    .slot-card > * {
      position: relative;
      z-index: 1;
    }

    .slot-card strong {
      min-width: 0;
      color: #fff;
      font-size: 13px;
      line-height: 1.1;
      overflow: hidden;
      text-overflow: clip;
      white-space: nowrap;
    }

    .slot-card span {
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.1;
    }

    .slot-card .slot-number {
      width: 22px;
      height: 22px;
      margin: 0 auto;
      border-radius: 999px;
      background: var(--slot-color);
      color: #17202b;
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .slot-sprite {
      width: 48px;
      height: 48px;
      margin: 0 auto;
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 2px 0 rgba(0, 0, 0, 0.28));
    }

    .slot-card i {
      position: absolute;
      z-index: 0;
      right: 0;
      bottom: 0;
      left: 0;
      height: 2%;
      background: color-mix(in srgb, var(--slot-color), transparent 35%);
      pointer-events: none;
    }

    .slot-card.selected {
      outline: 3px solid #80dc24;
      outline-offset: -3px;
    }

    .stage {
      display: grid;
      grid-template-columns: minmax(360px, 1fr) 260px;
      gap: 12px;
      align-items: stretch;
    }

    canvas {
      width: 100%;
      height: min(70vh, 720px);
      min-height: 420px;
      border: 1px solid #3d4857;
      border-radius:8px;
    }

    .panel {
      display: grid;
      align-content: start;
      gap: 10px;
      padding: 12px;
      border: 1px solid #3d4857;
      border-radius: 8px;
      background: #1d242d;
    }

    .readout {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px;
      border-radius: 7px;
      background: #151b23;
    }

    .readout span {
      color: #9da9b8;
      font-weight: 700;
    }

    .readout strong {
      font-size: 18px;
    }

    .exit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .keys {
      display: grid;
      gap: 5px;
      color: #aeb9c7;
      font-size: 13px;
      line-height: 1.3;
    }

    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: 1fr 1fr;
      }

      .field-route {
        grid-column: span 2;
      }

      .slot-strip {
        grid-template-columns: repeat(5, 1fr);
      }

      .stage {
        grid-template-columns: 1fr;
      }

      canvas {
        height: 64vh;
        min-height: 360px;
      }
    }

    @media (max-width: 520px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .field-route {
        grid-column: auto;
      }

      .slot-strip {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
  <script type="module" src="/src/main.ts"></script>
</head>
<body>
  <div id="app"></div>
</body>
</html>
